<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitus</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.webmanifest">
    <style>
        body { background-color: #000000; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-[#f4f4f5] font-sans antialiased pb-24">

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="max-w-md mx-auto min-h-screen px-4 pt-6 space-y-6">
        
        <!-- ENCABEZADO MINIMALISTA -->
        <div class="flex justify-between items-center bg-[#09090b] p-4 rounded-xl border border-[#18181b]">
            <div>
                <h1 class="text-lg font-black tracking-wider text-white">HABITUS</h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <span id="fecha-hoy" class="text-[11px] text-[#a1a1aa] font-medium uppercase tracking-tight"></span>
                    <span class="text-[#27272a] text-[10px]">|</span>
                    <span id="reloj-digital" class="text-[11px] font-mono text-[#a1a1aa]">00:00</span>
                </div>
            </div>
            
            <!-- Racha Dinámica Inteligente -->
            <div id="racha-wrapper" class="flex items-center gap-1.5 bg-[#18181b] border border-[#27272a] px-3 py-1.5 rounded-full text-xs font-bold transition-all duration-300">
                <span id="racha-flama" class="text-sm">🔥</span>
                <span id="racha-contador" class="text-white">0</span> <span class="text-[#a1a1aa] text-[10px] uppercase tracking-wider font-medium">Días</span>
            </div>
        </div>

        <!-- SECCIÓN 1: PLANIFICADOR DE HÁBITOS (TAB ACTIVA POR DEFECTO) -->
        <div id="view-planificador" class="space-y-5 app-view">
            
            <!-- NAVEGACIÓN CALENDARIO MENSUAL -->
            <div class="bg-[#09090b] p-4 rounded-xl border border-[#18181b] space-y-3">
                <div class="flex justify-between items-center">
                    <button id="btn-prev-mes" class="text-[#a1a1aa] hover:text-white p-1 text-xs font-bold">←</button>
                    <span id="mes-ano-titulo" class="text-xs font-bold uppercase tracking-widest text-white">Julio 2026</span>
                    <button id="btn-next-mes" class="text-[#a1a1aa] hover:text-white p-1 text-xs font-bold">→</button>
                </div>
                
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-[#52525b] uppercase tracking-wider">
                    <div>Do</div><div>Lu</div><div>Ma</div><div>Mi</div><div>Ju</div><div>Vi</div><div>Sá</div>
                </div>
                <div id="grid-calendario" class="grid grid-cols-7 gap-1"></div>
            </div>

            <!-- BLOQUE AGREGAR TAREAS (SOLO FUTURO/HOY) -->
            <div id="wrapper-input-tarea" class="bg-[#09090b] p-3 rounded-xl border border-[#18181b] flex gap-2 items-center">
                <input type="text" id="input-nueva-tarea" class="flex-1 bg-transparent text-sm text-white focus:outline-none placeholder-[#52525b]" placeholder="Añadir nuevo hábito...">
                <input type="time" id="input-hora-tarea" class="bg-[#18181b] border border-[#27272a] rounded-md p-1.5 text-xs text-white focus:outline-none w-20 font-mono">
                <button id="btn-agregar" class="bg-white text-black text-xs font-bold px-3 py-2 rounded-md hover:bg-zinc-200 transition-all">+</button>
            </div>

            <!-- CONTENEDOR DE TAREAS Y STATUS -->
            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <span class="text-[11px] font-bold uppercase tracking-wider text-[#52525b]">Bloque de Rutinas</span>
                    <div id="badge-contador" class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-[#18181b] border border-[#27272a] text-[#a1a1aa]">0 pendientes</div>
                </div>
                <div id="tasks-container" class="space-y-2"></div>
            </div>
        </div>

        <!-- SECCIÓN 2: DIARIO DE IDEAS -->
        <div id="view-diario" class="space-y-4 app-view hidden">
            <div class="bg-[#09090b] p-4 rounded-xl border border-[#18181b] space-y-3">
                <h2 class="text-xs font-bold uppercase tracking-widest text-white">Laboratorio de Ideas</h2>
                <textarea id="input-nueva-idea" class="w-full h-24 bg-[#121214] border border-[#18181b] rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#27272a] placeholder-[#52525b] resize-none" placeholder="Escribe una idea, recordatorio científico o inspiración rápida..."></textarea>
                <div class="flex justify-end">
                    <button id="btn-guardar-idea" class="bg-white text-black text-xs font-bold px-4 py-2 rounded-md hover:bg-zinc-200 transition-all">Guardar Idea</button>
                </div>
            </div>

            <div class="space-y-2">
                <span class="text-[11px] font-bold uppercase tracking-wider text-[#52525b] block px-1">Ideas Guardadas</span>
                <div id="ideas-container" class="space-y-2"></div>
            </div>
        </div>

    </div>

    <!-- MENÚ DE NAVEGACIÓN INFERIOR (TABS FIJAS) -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#09090b]/90 backdrop-blur-md border-t border-[#18181b] py-3 z-50">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button id="tab-planificador" class="flex flex-col items-center gap-1 text-white transition-all">
                <span class="text-lg">📋</span>
                <span class="text-[10px] font-medium tracking-tight">Hábitos</span>
            </button>
            <button id="tab-diario" class="flex flex-col items-center gap-1 text-[#52525b] hover:text-[#a1a1aa] transition-all">
                <span class="text-lg">💡</span>
                <span class="text-[10px] font-medium tracking-tight">Diario</span>
            </button>
        </div>
    </div>

    <script>
        const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        function obtenerFechaLocal() { 
    return new Date(); 
}

// Reemplazo definitivo para formatear la fecha YYYY-MM-DD usando la hora local exacta
        function obtenerFechaLocalStr(dateObj) {
            const año = dateObj.getFullYear();
            const mes = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dia = String(dateObj.getDate()).padStart(2, '0');
            return `${año}-${mes}-${dia}`;
        }

        const hoyLocal = obtenerFechaLocal();
        let fechaSeleccionadaStr = obtenerFechaLocalStr(hoyLocal); // <-- Corrección de desfase UTC
        let mesVisual = hoyLocal.getMonth();
        let anoVisual = hoyLocal.getFullYear();

        // PERSISTENCIA
        let estructuraFechas = JSON.parse(localStorage.getItem('habitus_v6_fechas')) || {};
        let listaIdeas = JSON.parse(localStorage.getItem('habitus_v6_ideas')) || [];
        let rachaActual = parseInt(localStorage.getItem('habitus_v6_racha')) || 0;
        let ultimoDiaAcceso = localStorage.getItem('habitus_v6_ultimo_acceso') || "";
        let logsNotificacionesEnviadas = JSON.parse(localStorage.getItem('habitus_v6_notifs_logs')) || {};

        if (ultimoDiaAcceso > obtenerFechaLocalStr(hoyLocal)) {
            ultimoDiaAcceso = obtenerFechaLocalStr(hoyLocal);
            fechaSeleccionadaStr = ultimoDiaAcceso;
        }
        
        // DOM
        const gridCalendario = document.getElementById('grid-calendario');
        const mesAnoTitulo = document.getElementById('mes-ano-titulo');
        const tasksContainer = document.getElementById('tasks-container');
        const badgeContador = document.getElementById('badge-contador');
        const rachaContador = document.getElementById('racha-contador');
        const rachaFlama = document.getElementById('racha-flama');
        const rachaWrapper = document.getElementById('racha-wrapper');
        const inputNueva = document.getElementById('input-nueva-tarea');
        const inputHora = document.getElementById('input-hora-tarea');
        const btnAgregar = document.getElementById('btn-agregar');
        const wrapperInputTarea = document.getElementById('wrapper-input-tarea');

        const inputNuevaIdea = document.getElementById('input-nueva-idea');
        const btnGuardarIdea = document.getElementById('btn-guardar-idea');
        const ideasContainer = document.getElementById('ideas-container');

        const tabPlanificador = document.getElementById('tab-planificador');
        const tabDiario = document.getElementById('tab-diario');
        const viewPlanificador = document.getElementById('view-planificador');
        const viewDiario = document.getElementById('view-diario');

        // RELOJ Y MONITOREO
        function procesarTiempoReal() {
            const ahora = obtenerFechaLocal();
            document.getElementById('reloj-digital').innerText = ahora.toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('fecha-hoy').innerText = ahora.toLocaleDateString('es-EC', { weekday: 'short', day: 'numeric', month: 'short' });
            evaluarAlertasProgramadas(ahora);
        }
        setInterval(procesarTiempoReal, 1000);

        // EVALUACIÓN DE CAMBIO DE DÍA Y RACHAS
        function evaluarCambioDeDia() {
            const hoyStr = obtenerFechaLocalStr(obtenerFechaLocal());

            if (ultimoDiaAcceso && ultimoDiaAcceso !== hoyStr) {
                const ayerDate = new Date(obtenerFechaLocal());
                ayerDate.setDate(ayerDate.getDate() - 1);
                const ayerStr = obtenerFechaLocalStr(ayerDate);

                const tareasAyer = estructuraFechas[ayerStr] || [];
                const pendientesAyer = tareasAyer.filter(t => !t.completada);

                if (pendientesAyer.length > 0) {
                    rachaActual = 0;
                    localStorage.setItem('habitus_v6_racha', rachaActual);
                    
                    pendientesAyer.forEach(tarea => {
                        const textoLimpio = tarea.texto.replace(/^⚠️\s*/, "");
                        if (!estructuraFechas[hoyStr]) estructuraFechas[hoyStr] = [];
                        if (!estructuraFechas[hoyStr].some(t => t.texto.includes(textoLimpio))) {
                            estructuraFechas[hoyStr].push({
                                id: Date.now() + Math.random(),
                                texto: `⚠️ ${textoLimpio}`,
                                hora: tarea.hora,
                                completada: false
                            });
                        }
                    });
                    localStorage.setItem('habitus_v6_fechas', JSON.stringify(estructuraFechas));
                    triggerNotificacion('Racha Reiniciada 💔', 'Quedaron hábitos pendientes del día anterior.');
                } else if (tareasAyer.length > 0) {
                    rachaActual++;
                    localStorage.setItem('habitus_v6_racha', rachaActual);
                    triggerNotificacion('¡Racha Extendida! 🔥', `Mantienes tu disciplina por ${rachaActual} días.`);
                }
            }
            ultimoDiaAcceso = hoyStr;
            localStorage.setItem('habitus_v6_ultimo_acceso', hoyStr);
            actualizarEstiloRachaVisual();
        }

        function actualizarEstiloRachaVisual() {
            rachaContador.innerText = rachaActual;
            if (rachaActual > 0) {
                rachaFlama.className = "text-sm opacity-100 filter-none animate-pulse";
                rachaWrapper.className = "flex items-center gap-1.5 bg-[#251605] border border-[#7c2d12] px-3 py-1.5 rounded-full text-xs font-bold text-amber-500 transition-all duration-300";
            } else {
                rachaFlama.className = "text-sm opacity-40 grayscale";
                rachaWrapper.className = "flex items-center gap-1.5 bg-[#18181b] border border-[#27272a] px-3 py-1.5 rounded-full text-xs font-bold text-zinc-500 transition-all duration-300";
            }
        }

        // CALENDARIO MÓVIL
        function renderCalendario() {
            gridCalendario.innerHTML = "";
            mesAnoTitulo.innerText = `${MESES[mesVisual]} ${anoVisual}`;

            const primerDiaMes = new Date(anoVisual, mesVisual, 1).getDay();
            const totalDiasMes = new Date(anoVisual, mesVisual + 1, 0).getDate();
            const hoyStr = obtenerFechaLocalStr(obtenerFechaLocal());

            for (let i = 0; i < primerDiaMes; i++) {
                gridCalendario.appendChild(document.createElement('div'));
            }

            for (let dia = 1; dia <= totalDiasMes; dia++) {
                const celdaDia = document.createElement('button');
                const mesFormateado = String(mesVisual + 1).padStart(2, '0');
                const diaFormateado = String(dia).padStart(2, '0');
                const fechaCeldaStr = `${anoVisual}-${mesFormateado}-${diaFormateado}`;

                const esHoy = fechaCeldaStr === hoyStr;
                const esSeleccionado = fechaCeldaStr === fechaSeleccionadaStr;
                const esPasado = fechaCeldaStr < hoyStr;

                const tareasDia = estructuraFechas[fechaCeldaStr] || [];
                const tienePendientes = tareasDia.some(t => !t.completada);

                celdaDia.className = `p-2 text-xs font-bold rounded-md transition-all relative ${
                    esSeleccionado 
                    ? 'bg-white text-black font-black shadow-md' 
                    : esHoy 
                        ? 'bg-[#1c1917] text-[#f43f5e] border border-[#e11d48]/40' 
                        : esPasado
                            ? 'opacity-30 bg-transparent text-zinc-600 border border-transparent cursor-pointer'
                            : 'bg-[#09090b] text-[#e1e1e6] border border-[#18181b] hover:border-[#27272a]'
                }`;
                celdaDia.innerText = dia;

                if (tienePendientes && !esSeleccionado) {
                    const dot = document.createElement('span');
                    dot.className = "absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-[#04d361] rounded-full";
                    celdaDia.appendChild(dot);
                }

                celdaDia.onclick = () => {
                    fechaSeleccionadaStr = fechaCeldaStr;
                    renderCalendario();
                    renderTareas();
                };
                gridCalendario.appendChild(celdaDia);
            }
        }

        document.getElementById('btn-prev-mes').onclick = () => { mesVisual--; if (mesVisual < 0) { mesVisual = 11; anoVisual--; } renderCalendario(); };
        document.getElementById('btn-next-mes').onclick = () => { mesVisual++; if (mesVisual > 11) { mesVisual = 0; anoVisual++; } renderCalendario(); };

        // ACCIONES HÁBITOS
        function agregarTarea() {
            const texto = inputNueva.value.trim();
            const hora = inputHora.value;
            if (texto) {
                if (!estructuraFechas[fechaSeleccionadaStr]) estructuraFechas[fechaSeleccionadaStr] = [];
                estructuraFechas[fechaSeleccionadaStr].push({
                    id: Date.now() + Math.random(),
                    texto: texto,
                    hora: hora || null,
                    completada: false
                });
                estructuraFechas[fechaSeleccionadaStr].sort((a, b) => (a.hora || '23:59').localeCompare(b.hora || '23:59'));
                localStorage.setItem('habitus_v6_fechas', JSON.stringify(estructuraFechas));
                inputNueva.value = ""; inputHora.value = "";
                renderTareas(); renderCalendario();
                sincronizarNotificacionWidget();
            }
        }
        btnAgregar.onclick = agregarTarea;

        window.eliminarTarea = function(id) {
            estructuraFechas[fechaSeleccionadaStr] = estructuraFechas[fechaSeleccionadaStr].filter(t => t.id !== id);
            localStorage.setItem('habitus_v6_fechas', JSON.stringify(estructuraFechas));
            renderTareas();
            renderCalendario();
            sincronizarNotificacionWidget();
        };

        window.conmutarTarea = function(id) {
            const tarea = estructuraFechas[fechaSeleccionadaStr].find(t => t.id === id);
            if (tarea) {
                tarea.completada = !tarea.completada;
                localStorage.setItem('habitus_v6_fechas', JSON.stringify(estructuraFechas));
                renderTareas();
                renderCalendario();
                sincronizarNotificacionWidget();
            }
        };

        function renderTareas() {
            tasksContainer.innerHTML = "";
            const hoyStr = obtenerFechaLocalStr(obtenerFechaLocal()); // <-- Cambiar aquí también
            const esPasado = fechaSeleccionadaStr < hoyStr;

            wrapperInputTarea.style.display = esPasado ? 'none' : 'flex';

            const tareasDelDia = estructuraFechas[fechaSeleccionadaStr] || [];
            let deVerdadPendientes = 0;

            tareasDelDia.forEach((tarea) => {
                if (!tarea.completada) deVerdadPendientes++;

                const itemDiv = document.createElement('div');
                itemDiv.className = "flex gap-2 items-center w-full";
                itemDiv.innerHTML = `
                    <button onclick="conmutarTarea(${tarea.id})" ${esPasado ? 'disabled' : ''} class="flex-1 text-left p-3.5 rounded-xl border text-sm font-medium flex justify-between items-center transition-all ${
                        tarea.completada 
                        ? 'bg-[#09090b] text-[#3f3f46] border-[#18181b] line-through opacity-40' 
                        : 'bg-[#09090b] text-zinc-200 border-[#18181b] hover:border-[#27272a]'
                    }">
                        <div class="flex flex-col">
                            <span class="tracking-tight">${tarea.texto}</span>
                            ${tarea.hora ? `<span class="text-[10px] text-[#a1a1aa] font-mono mt-0.5">⏱️ ${tarea.hora}</span>` : ''}
                        </div>
                        <span class="text-xs ${tarea.completada ? 'text-white' : 'text-[#27272a]'}">${tarea.completada ? '●' : '○'}</span>
                    </button>
                    <button onclick="eliminarTarea(${tarea.id})" class="p-3 text-zinc-600 hover:text-red-400 rounded-lg text-sm transition-colors">✕</button>
                `;
                tasksContainer.appendChild(itemDiv);
            });

            badgeContador.innerText = `${deVerdadPendientes} pendientes`;
        }

        // ALGORITMO COMPACTADOR DE NOTIFICACIONES
        function evaluarAlertasProgramadas(ahora) {
            const hoyStr = obtenerFechaLocalStr(ahora);
            const tareasHoy = estructuraFechas[hoyStr] || [];
            const pendientes = tareasHoy.filter(t => !t.completada && t.hora);

            if (pendientes.length === 0) return;
            const horaActualMs = ahora.getTime();

            pendientes.forEach(tarea => {
                const [h, m] = tarea.hora.split(':');
                const fechaTarea = new Date(ahora);
                fechaTarea.setHours(parseInt(h), parseInt(m), 0, 0);
                const tiempoTareaMs = fechaTarea.getTime();

                const puntosDeControl = [
                    { clave: 'en_punto', offset: 0, msg: `Momento de actuar: ${tarea.texto}` },
                    { clave: '30_min', offset: 30 * 60 * 1000, msg: `En 30 minutos: ${tarea.texto}` },
                    { clave: '60_min', offset: 60 * 60 * 1000, msg: `En 1 hora aproximada: ${tarea.texto}` }
                ];

                puntosDeControl.forEach(punto => {
                    const tiempoTargetMs = tiempoTareaMs - punto.offset;
                    if (Math.abs(horaActualMs - tiempoTargetMs) < 10000) {
                        const idAlertaUnico = `${tarea.id}_${punto.clave}_${hoyStr}`;
                        
                        if (!logsNotificacionesEnviadas[idAlertaUnico]) {
                            const tareasCercanas = pendientes.filter(otra => {
                                if (otra.id === tarea.id) return false;
                                const [oh, om] = otra.hora.split(':');
                                const fOtra = new Date(ahora);
                                fOtra.setHours(parseInt(oh), parseInt(om), 0, 0);
                                return Math.abs(fOtra.getTime() - tiempoTareaMs) <= 60 * 60 * 1000;
                            });

                            if (tareasCercanas.length > 0) {
                                const bloqueCompleto = [tarea, ...tareasCercanas];
                                bloqueCompleto.sort((a, b) => a.hora.localeCompare(b.hora));
                                const proximaTarea = bloqueCompleto[0];

                                if (tarea.id === proximaTarea.id) {
                                    const listaTitulos = bloqueCompleto.map(t => `• ${t.texto} (${t.hora})`).join('\n');
                                    triggerNotificacion('Bloque Concentrado 🪐', `Bloque de rutinas aproximándose:\n${listaTitulos}`);
                                    bloqueCompleto.forEach(t => {
                                        logsNotificacionesEnviadas[`${t.id}_${punto.clave}_${hoyStr}`] = true;
                                    });
                                }
                            } else {
                                triggerNotificacion('Habitus Alerta ⏱️', punto.msg);
                                logsNotificacionesEnviadas[idAlertaUnico] = true;
                            }
                            localStorage.setItem('habitus_v6_notifs_logs', JSON.stringify(logsNotificacionesEnviadas));
                        }
                    }
                });
            });
        }

        // SINCRONIZACIÓN DISCRETA DEL WIDGET EN LA BARRA
        function sincronizarNotificacionWidget() {
            const hoyStr = obtenerFechaLocalStr(obtenerFechaLocal());
            const delDia = estructuraFechas[hoyStr] || [];
            const pendientes = delDia.filter(t => !t.completada).length;
            
            if (delDia.length > 0) {
                triggerNotificacion(
                    pendientes === 0 ? '¡Día completado! 🎉' : 'Control de Hábitos',
                    pendientes === 0 ? 'Has cumplido todas tus rutinas hoy.' : `Faltan ${pendientes} actividades por completar.`
                );
            }
        }

        function triggerNotificacion(titulo, cuerpo) {
            if ('serviceWorker' in navigator && Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(titulo, {
                        body: cuerpo,
                        tag: 'habitus-widget',
                        renotify: false,
                        silent: true,
                        requireInteraction: true
                    });
                });
            }
        }

        // TABS NAVEGACIÓN Y DIARIO
        function switchTab(activeTab, inactiveTab, showView, hideView) {
            activeTab.classList.remove('text-[#52525b]');
            activeTab.classList.add('text-white');
            inactiveTab.classList.remove('text-white');
            inactiveTab.classList.add('text-[#52525b]');
            showView.classList.remove('hidden');
            hideView.classList.add('hidden');
        }

        tabPlanificador.onclick = () => switchTab(tabPlanificador, tabDiario, viewPlanificador, viewDiario);
        tabDiario.onclick = () => {
            switchTab(tabDiario, tabPlanificador, viewDiario, viewPlanificador);
            renderIdeas();
        };

        btnGuardarIdea.onclick = () => {
            const texto = inputNuevaIdea.value.trim();
            if (texto) {
                listaIdeas.unshift({
                    id: Date.now(),
                    texto: texto,
                    fecha: obtenerFechaLocal().toLocaleString('es-EC', { dateStyle: 'short', timeStyle: 'short' })
                });
                localStorage.setItem('habitus_v6_ideas', JSON.stringify(listaIdeas));
                inputNuevaIdea.value = "";
                renderIdeas();
            }
        };

        window.eliminarIdea = function(id) {
            listaIdeas = listaIdeas.filter(idea => idea.id !== id);
            localStorage.setItem('habitus_v6_ideas', JSON.stringify(listaIdeas));
            renderIdeas();
        };

        function renderIdeas() {
            ideasContainer.innerHTML = "";
            listaIdeas.forEach(idea => {
                const card = document.createElement('div');
                card.className = "bg-[#09090b] p-4 rounded-xl border border-[#18181b] space-y-2 relative";
                card.innerHTML = `
                    <p class="text-sm text-zinc-200 leading-relaxed">${idea.texto}</p>
                    <div class="flex justify-between items-center pt-1">
                        <span class="text-[10px] text-[#52525b] font-mono">${idea.fecha}</span>
                        <button onclick="eliminarIdea(${idea.id})" class="text-xs text-zinc-600 hover:text-red-400 transition-colors">Eliminar</button>
                    </div>
                `;
                ideasContainer.appendChild(card);
            });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(() => {
                    if (Notification.permission === 'default') Notification.requestPermission();
                });
            });
        }

        // RUN
        evaluarCambioDeDia();
        renderCalendario();
        renderTareas();
        procesarTiempoReal();
    </script>
